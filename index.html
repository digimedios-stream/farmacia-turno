<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Farmacia de Turno | Tu salud siempre cerca</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .container {
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
        }

        .pharmacy-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.05);
            padding: 32px 28px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .header-badge {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            gap: 12px;
        }

        .turn-indicator {
            background: #eaf9e7;
            color: #1e7b3c;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 6px 14px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .current-date {
            font-size: 0.9rem;
            font-weight: 500;
            color: #5b6e8c;
            background: rgba(91, 110, 140, 0.1);
            padding: 6px 14px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Contador regresivo y barra de progreso */
        .turno-progress {
            margin: 20px 0 24px 0;
            background: #f1f5f9;
            border-radius: 24px;
            padding: 16px 20px;
        }

        .progress-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #334155;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .countdown-digits {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            background: #0f172a;
            color: #facc15;
            padding: 4px 12px;
            border-radius: 40px;
            letter-spacing: 1px;
        }

        .progress-bar-container {
            background-color: #e2e8f0;
            border-radius: 40px;
            height: 8px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #2dd4bf);
            border-radius: 40px;
            transition: width 0.5s ease-out;
        }

        .progress-note {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 8px;
            text-align: right;
        }

        .pharmacy-name {
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 0 0 16px 0;
            color: #0a1c2f;
            letter-spacing: -0.02em;
            word-break: break-word;
        }

        .address-block {
            display: flex;
            gap: 12px;
            background: #f8fafd;
            padding: 16px 18px;
            border-radius: 28px;
            margin: 0 0 32px 0;
            align-items: flex-start;
            border: 1px solid #eef2f8;
        }

        .address-icon {
            color: #3b82f6;
            font-size: 1.4rem;
            margin-top: 2px;
        }

        .address-text {
            font-size: 1rem;
            font-weight: 500;
            color: #1e2f44;
            line-height: 1.4;
            flex: 1;
        }

        .buttons-container {
            display: flex;
            flex-direction: row;
            gap: 18px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.25s ease;
            border: none;
            cursor: pointer;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            box-shadow: 0 8px 18px -8px rgba(37, 211, 102, 0.4);
        }

        .btn-whatsapp i {
            font-size: 1.5rem;
        }

        .btn-whatsapp:hover {
            background: #20b859;
            transform: translateY(-2px);
            box-shadow: 0 12px 22px -10px rgba(37, 211, 102, 0.5);
        }

        .btn-call {
            background: #3b82f6;
            color: white;
            box-shadow: 0 8px 18px -8px rgba(59, 130, 246, 0.4);
        }

        .btn-call i {
            font-size: 1.4rem;
        }

        .btn-call:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 12px 22px -10px rgba(59, 130, 246, 0.5);
        }

        .btn-maps {
            background: #ffffff;
            color: #1a73e8;
            border: 1px solid #dce5f0;
        }

        .btn-maps i {
            font-size: 1.4rem;
            color: #ea4335;
        }

        .btn-maps:hover {
            background: #f0f6ff;
            border-color: #c2d4ff;
            transform: translateY(-2px);
        }

        .disabled-btn {
            opacity: 0.5;
            background: #e2e8f0;
            color: #64748b;
            cursor: default;
        }

        .loading-state, .error-state {
            text-align: center;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top-color: #2c7da0;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .retry-btn {
            background: #2c3e66;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .footer-credit {
            text-align: center;
            margin-top: 28px;
            font-size: 0.75rem;
            color: #8ba0bc;
        }

        @media (max-width: 550px) {
            .pharmacy-card {
                padding: 24px 20px;
                border-radius: 36px;
            }
            .pharmacy-name {
                font-size: 1.9rem;
            }
            .buttons-container {
                flex-direction: column;
            }
            .btn {
                padding: 16px 12px;
                font-size: 1rem;
            }
            .countdown-digits {
                font-size: 1rem;
                padding: 3px 10px;
            }
        }

        @media (min-width: 768px) {
            .pharmacy-name {
                font-size: 3rem;
            }
            .pharmacy-card {
                padding: 40px 38px;
            }
            .btn {
                padding: 20px 18px;
                font-size: 1.2rem;
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pharmacy-card {
            animation: fadeSlideUp 0.5s ease-out;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="pharmacy-card" id="appContent">
        <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <p style="color:#4a627a;">Cargando farmacia de turno...</p>
        </div>
    </div>
    <div class="footer-credit">
        <i class="fas fa-shield-alt"></i> Actualización diaria · Servicio público
    </div>
</div>

<script>
    // ⚠️ REEMPLAZA ESTA URL CON LA DE TU WEB APP DE GOOGLE APPS SCRIPT
    const API_URL = "https://script.google.com/macros/s/AKfycbxPbjHw0_UTBdMzTbnVxVsGnlE7a-vs4IbLqsetvYDuimYcoStAKnu27g1sigQwDHCwnA/exec";
    
    const appContainer = document.getElementById('appContent');
    let countdownInterval = null;
    
    function getFormattedDate() {
        const today = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        let formatted = today.toLocaleDateString('es-ES', options);
        return formatted.charAt(0).toUpperCase() + formatted.slice(1);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Calcular tiempo restante hasta las 08:00 AM
    function getTimeUntilNextTurn() {
        const now = new Date();
        const nextTurn = new Date(now);
        
        nextTurn.setHours(8, 0, 0, 0);
        
        if (now.getHours() >= 8) {
            nextTurn.setDate(now.getDate() + 1);
        }
        
        const diffMs = nextTurn - now;
        const diffSecs = Math.floor(diffMs / 1000);
        const hours = Math.floor(diffSecs / 3600);
        const minutes = Math.floor((diffSecs % 3600) / 60);
        const seconds = diffSecs % 60;
        
        // Porcentaje de progreso del turno actual
        let porcentaje = 0;
        const startOfDay = new Date(now);
        startOfDay.setHours(8, 0, 0, 0);
        const endOfDay = new Date(now);
        endOfDay.setHours(8, 0, 0, 0);
        endOfDay.setDate(now.getDate() + 1);
        
        if (now >= startOfDay) {
            const totalMs = endOfDay - startOfDay;
            const elapsedMs = now - startOfDay;
            porcentaje = (elapsedMs / totalMs) * 100;
        } else {
            const prevStart = new Date(now);
            prevStart.setHours(8, 0, 0, 0);
            prevStart.setDate(now.getDate() - 1);
            const prevEnd = new Date(now);
            prevEnd.setHours(8, 0, 0, 0);
            const totalPrev = prevEnd - prevStart;
            const elapsedPrev = now - prevStart;
            porcentaje = (elapsedPrev / totalPrev) * 100;
        }
        
        return { hours, minutes, seconds, porcentaje: Math.min(100, Math.max(0, porcentaje)) };
    }
    
    // Actualizar contador en el DOM
    function updateCountdown() {
        const countdownElement = document.getElementById('countdown-timer');
        const progressBar = document.getElementById('progress-bar-fill');
        
        if (!countdownElement || !progressBar) return;
        
        const { hours, minutes, seconds, porcentaje } = getTimeUntilNextTurn();
        const formatted = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        countdownElement.textContent = formatted;
        progressBar.style.width = `${porcentaje}%`;
    }
    
    // Iniciar el contador (se llama después de renderizar la card)
    function startCountdown() {
        if (countdownInterval) clearInterval(countdownInterval);
        updateCountdown();
        countdownInterval = setInterval(updateCountdown, 1000);
    }
    
    // Renderizar la tarjeta principal
    function renderPharmacyCard(pharmacy) {
        const nombre = pharmacy.nombre || "Farmacia de turno";
        const direccion = pharmacy.direccion || "Dirección no disponible";
        const telefono = pharmacy.telefono || "";
        let mapsUrl = pharmacy.urlMaps || "";
        
        if (!mapsUrl && direccion !== "Dirección no disponible") {
            mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(direccion)}`;
        } else if (!mapsUrl) {
            mapsUrl = "https://maps.google.com";
        }
        
        // Detección automática del tipo de teléfono
        let telefonoStr = String(telefono).trim();
        let esWhatsApp = false;
        let numeroLimpio = telefonoStr.replace(/[\s\-\(\)]/g, '');
        
        if (numeroLimpio.startsWith('549') || numeroLimpio.startsWith('598')) {
            esWhatsApp = true;
        }
        if (numeroLimpio.startsWith('+549') || numeroLimpio.startsWith('+598')) {
            esWhatsApp = true;
            numeroLimpio = numeroLimpio.substring(1);
        }
        
        let botonTelefono = "";
        if (!telefono) {
            botonTelefono = `
                <div class="btn disabled-btn">
                    <i class="fas fa-phone-alt"></i> Sin teléfono disponible
                </div>
            `;
        } else if (esWhatsApp) {
            let whatsappUrl = `https://wa.me/${numeroLimpio}?text=Hola%2C%20vi%20que%20est%C3%A1n%20de%20turno%20hoy.%20%C2%BFpodr%C3%ADan%20ayudarme%3F`;
            botonTelefono = `
                <a href="${whatsappUrl}" target="_blank" rel="noopener noreferrer" class="btn btn-whatsapp">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
            `;
        } else {
            let callUrl = `tel:${numeroLimpio}`;
            botonTelefono = `
                <a href="${callUrl}" class="btn btn-call">
                    <i class="fas fa-phone-alt"></i> Llamar ahora
                </a>
            `;
        }
        
        const fechaHoy = getFormattedDate();
        
        return `
            <div class="header-badge">
                <span class="turn-indicator"><i class="fas fa-prescription-bottle"></i> Farmacia de turno hoy</span>
                <span class="current-date"><i class="far fa-calendar-alt"></i> ${fechaHoy}</span>
            </div>
            <div class="turno-progress">
                <div class="progress-label">
                    <i class="fas fa-hourglass-half"></i> Próximo cambio de turno:
                    <span id="countdown-timer" class="countdown-digits">--:--:--</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
                <div class="progress-note">La farmacia cambiará a las 08:00 AM</div>
            </div>
            <div class="pharmacy-name">${escapeHtml(nombre)}</div>
            <div class="address-block">
                <div class="address-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="address-text">${escapeHtml(direccion)}</div>
            </div>
            <div class="buttons-container">
                ${botonTelefono}
                <a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" class="btn btn-maps">
                    <i class="fas fa-map"></i> Ver en Maps
                </a>
            </div>
        `;
    }
    
    function showError(message) {
        if (countdownInterval) clearInterval(countdownInterval);
        appContainer.innerHTML = `
            <div class="error-state">
                <i class="fas fa-exclamation-triangle"></i>
                <p style="font-weight: 500; color:#b91c1c;">${escapeHtml(message)}</p>
                <button class="retry-btn" id="retryButton"><i class="fas fa-sync-alt"></i> Reintentar</button>
            </div>
        `;
        document.getElementById('retryButton')?.addEventListener('click', fetchPharmacyOfTheDay);
    }
    
    async function fetchPharmacyOfTheDay() {
        if (countdownInterval) clearInterval(countdownInterval);
        appContainer.innerHTML = `<div class="loading-state"><div class="spinner"></div><p style="color:#4a627a;">Buscando farmacia de turno...</p></div>`;
        try {
            const url = `${API_URL}${API_URL.includes('?') ? '&' : '?'}_=${Date.now()}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
            const data = await response.json();
            
            if (!data.success || !data.pharmacy) {
                throw new Error(data.error || "No se encontró farmacia para hoy");
            }
            
            const htmlContent = renderPharmacyCard(data.pharmacy);
            appContainer.innerHTML = htmlContent;
            startCountdown();
        } catch (error) {
            console.error(error);
            showError("No se pudo cargar la farmacia de turno. Verifica tu conexión o intenta más tarde.");
        }
    }
    
    document.addEventListener('DOMContentLoaded', fetchPharmacyOfTheDay);
</script>
</body>
</html>
